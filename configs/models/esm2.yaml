    esm2_t30_150M_UR50D:
      huggingface_id: facebook/esm2_t30_150M_UR50D
      params: 150M
      embedding_dim: 640
      num_layers: 30
    esm2_t33_650M_UR50D:
      huggingface_id: facebook/esm2_t33_650M_UR50D
      params: 650M
      embedding_dim: 1280
      num_layers: 33
    esm2_t36_3B_UR50D:
      huggingface_id: facebook/esm2_t36_3B_UR50D
